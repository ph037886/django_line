{% extends "recruitment/base.html" %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<article class="post-detail">
  <article>
    <div>
      {{ post.content|safe }}
    </div>
  </article>
  <div>
    <h2>應徵資訊：</h2>
    {% if visible_links %}
      <section class="job-links-section">
        <h3>人力銀行連結</h3>

        <div class="job-links">
          {% for link in visible_links %}
            <a
              class="job-link-btn"
              href="{{ link.job_link }}"
              target="_blank"
            >
              {{ link.job_name }}
            </a>
          {% endfor %}
        </div>
      </section>
    {% endif %}
    <p>電話直播：07-5817121轉2003，總藥師。</p>
  </div>
  <footer>
    <p>
      <a href="{% url 'recruitment:post_list' %}">返回徵才資訊列表</a>
    </p>
  </footer>  
</article>
{% endblock %}
